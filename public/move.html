<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000510">
<title>MOVE · idworld</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void: #000510; --abyss: #020a18; --cyan: #00f0ff; --cyan-dim: #00b8c4;
  --line: #0d3a5c; --amber: #ffaa00; --crimson: #ff3a4f; --emerald: #00ff8c;
  --fg: #e6f5ff; --fg-2: #92b8d4; --fg-3: #547294;
  --fs: 'Orbitron', sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, monospace;
  --fd: 'Cormorant Garamond', Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--void); color: var(--fg);
  font-family: var(--fs); height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.topbar {
  position: relative; z-index: 1000;
  display: grid; grid-template-columns: 1fr auto 1fr;
  padding: 12px 24px;
  background: linear-gradient(to bottom, rgba(2,10,24,0.95), rgba(2,10,24,0.7));
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
  font-family: var(--fm); font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fg-2);
}
.topbar .l, .topbar .r { display: flex; gap: 20px; align-items: center; }
.topbar .r { justify-content: flex-end; }
.topbar .c { display: flex; gap: 16px; justify-content: center; align-items: center; color: var(--fg-3); }
.topbar strong {
  font-family: var(--fs); font-weight: 900; font-size: 13px;
  color: var(--cyan); letter-spacing: 0.3em;
  text-shadow: 0 0 20px rgba(0,240,255,0.6);
}
.dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 8px;
  animation: pulse 2s ease-in-out infinite;
}
.dot.live { background: var(--emerald); box-shadow: 0 0 12px var(--emerald); }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: calc(100vh - 41px);
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 50% 50%; }
}

.sidebar {
  background: linear-gradient(135deg, rgba(2,10,24,0.95), rgba(5,21,40,0.9));
  border-right: 1px solid var(--line);
  overflow-y: auto;
  position: relative;
}

.section {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
}
.section-title {
  font-family: var(--fm); font-size: 9px; letter-spacing: 0.25em;
  color: var(--cyan); text-transform: uppercase;
  margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title .count {
  font-family: var(--fs); font-weight: 700; font-size: 11px;
  color: var(--amber);
}

.kpi-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.kpi {
  background: linear-gradient(135deg, rgba(13,58,92,0.3), rgba(5,21,40,0.5));
  border: 1px solid var(--line);
  border-left: 2px solid var(--cyan);
  padding: 12px 14px;
  position: relative;
}
.kpi::before {
  content: ''; position: absolute; top: -1px; right: -1px;
  width: 10px; height: 10px;
  border-top: 1px solid var(--cyan);
  border-right: 1px solid var(--cyan);
}
.kpi-label {
  font-family: var(--fm); font-size: 8px; letter-spacing: 0.2em;
  color: var(--cyan-dim); text-transform: uppercase; margin-bottom: 6px;
}
.kpi-value {
  font-family: var(--fd); font-size: 26px; font-style: italic;
  color: var(--fg); line-height: 1; font-weight: 500;
}
.kpi-value.amber { color: var(--amber); }
.kpi-value.crimson { color: var(--crimson); }
.kpi-value.emerald { color: var(--emerald); }
.kpi-detail {
  font-family: var(--fm); font-size: 9px; color: var(--fg-3);
  margin-top: 4px;
}

.event-list {
  font-family: var(--fm); font-size: 11px;
}
.event-row {
  padding: 10px 0;
  border-bottom: 1px solid rgba(13,58,92,0.5);
  cursor: pointer;
  transition: background 0.15s;
}
.event-row:hover {
  background: rgba(0,240,255,0.05);
  margin-left: -10px; margin-right: -10px;
  padding-left: 10px; padding-right: 10px;
}
.event-row:last-child { border-bottom: none; }
.event-meta {
  display: flex; justify-content: space-between;
  font-size: 9px; color: var(--fg-3);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 4px;
}
.event-mag {
  font-family: var(--fd); font-style: italic;
  font-size: 18px; font-weight: 500;
  color: var(--fg);
}
.event-mag.high { color: var(--crimson); }
.event-mag.med { color: var(--amber); }
.event-mag.low { color: var(--emerald); }
.event-loc {
  font-size: 10px; color: var(--fg-2);
  margin-top: 2px;
}

.volcanos-list { display: flex; flex-direction: column; gap: 8px; }
.volcan-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  background: rgba(13,58,92,0.2);
  border-left: 2px solid var(--emerald);
  font-family: var(--fm); font-size: 11px;
}
.volcan-row .name { color: var(--fg); font-weight: 500; }
.volcan-row .alert {
  font-size: 9px; padding: 2px 8px;
  background: rgba(0,255,140,0.1); color: var(--emerald);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.volcan-row.alert-yellow { border-left-color: var(--amber); }
.volcan-row.alert-yellow .alert { background: rgba(255,170,0,0.15); color: var(--amber); }

#map {
  height: 100%; width: 100%;
  background: var(--void);
  filter: brightness(0.85) contrast(1.05);
}
.leaflet-container { background: var(--void) !important; font-family: var(--fm) !important; }
.leaflet-popup-content-wrapper {
  background: rgba(2,10,24,0.95) !important;
  color: var(--fg) !important;
  border: 1px solid var(--cyan) !important;
  border-radius: 0 !important;
}
.leaflet-popup-tip { background: rgba(2,10,24,0.95) !important; border: 1px solid var(--cyan) !important; }
.leaflet-popup-content {
  font-family: var(--fm) !important; font-size: 11px;
  color: var(--fg) !important; margin: 12px !important;
}
.leaflet-popup-content strong { color: var(--cyan); font-family: var(--fs); }
.leaflet-control-attribution {
  background: rgba(2,10,24,0.7) !important;
  color: var(--fg-3) !important;
  font-size: 9px !important;
}
.leaflet-control-zoom a {
  background: rgba(2,10,24,0.9) !important;
  color: var(--cyan) !important;
  border: 1px solid var(--line) !important;
}

.legend {
  position: absolute; bottom: 24px; left: 24px;
  background: rgba(2,10,24,0.85);
  border: 1px solid var(--line);
  padding: 10px 14px;
  font-family: var(--fm); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--fg-2);
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.legend-dot.high { background: var(--crimson); box-shadow: 0 0 8px var(--crimson); }
.legend-dot.med { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.legend-dot.low { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }

  position: absolute; top: 16px; right: 16px;
  background: rgba(2,10,24,0.9);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  padding: 8px 16px;
  font-family: var(--fs); font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; z-index: 1000;
}
  background: rgba(0,240,255,0.1);
  box-shadow: 0 0 16px rgba(0,240,255,0.3);
}

.empty-state {
  font-family: var(--fm); font-size: 10px;
  color: var(--fg-3); letter-spacing: 0.15em;
  text-align: center; padding: 20px;
  text-transform: uppercase;
}

.loading {
  position: fixed; inset: 0;
  background: rgba(0,5,16,0.9);
  z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fm); font-size: 11px;
  color: var(--cyan); letter-spacing: 0.3em;
  text-transform: uppercase;
}
.loading.hidden { display: none; }
</style>
</head>
<body>

<header class="topbar">
  <div class="l">
    <span><strong>MOVE</strong></span>
    <span style="color:var(--fg-3);">·</span>
    <span>SISMOS · VOLCANES · ESTRUCTURAS</span>
  </div>
  <div class="c">
    <span><span class="dot live"></span><span id="status">EN VIVO</span></span>
    <span style="color:var(--fg-3);">·</span>
  </div>
  <div class="r">
    <a href="/" style="color:var(--cyan-dim); text-decoration:none;">← MENÚ</a>
    <a href="/kiosk" style="color:var(--cyan-dim); text-decoration:none;">KIOSK</a>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">

    <div class="section">
      <div class="section-title">ÚLTIMAS 24 HORAS</div>
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">EVENTOS</div>
          <div class="kpi-value" id="kpi-total">—</div>
          <div class="kpi-detail">sismos detectados</div>
        </div>
        <div class="kpi" style="border-left-color: var(--amber);">
          <div class="kpi-label">MAX MAG</div>
          <div class="kpi-value amber" id="kpi-max">—</div>
          <div class="kpi-detail">magnitud Richter</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">EVENTOS RECIENTES <span class="count" id="event-count">0</span></div>
      <div class="event-list" id="event-list">
        <div class="empty-state">Cargando...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">VOLCANES MONITOREADOS</div>
      <div class="volcanos-list" id="volcan-list">
        <div class="empty-state">Cargando...</div>
      </div>
    </div>

  </aside>

  <main style="position: relative;">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-row"><span class="legend-dot high"></span><span>M ≥ 4.0</span></div>
      <div class="legend-row"><span class="legend-dot med"></span><span>M 3.0 - 3.9</span></div>
      <div class="legend-row"><span class="legend-dot low"></span><span>M &lt; 3.0</span></div>
    </div>
  </main>

</div>

<div class="loading" id="loading">CARGANDO MOVE...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
// ============================================================
// MOVE Dashboard · sismos en tiempo real
// ============================================================

const STELLA_MARIS_URL = 'https://izemgxvytxhpxuzvgexs.supabase.co';
// Fetch de eventos via proxy /api/jarvis (que llama jarvis-domain-idworld)
const FETCH_URL = '/api/jarvis';

// ===== Reloj SV =====

// ===== Mapa Leaflet =====
const map = L.map('map', {
  center: [13.5, -88.9],  // El Salvador centro
  zoom: 7,
  minZoom: 5,
  maxZoom: 12,
  zoomControl: true,
  attributionControl: true,
});

// Tile dark theme
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

const sismoLayer = L.layerGroup().addTo(map);
const volcanLayer = L.layerGroup().addTo(map);

function magColor(m) {
  m = Number(m);
  if (m >= 4.0) return '#ff3a4f';
  if (m >= 3.0) return '#ffaa00';
  return '#00ff8c';
}
function magRadius(m) {
  m = Number(m);
  return Math.max(6, Math.min(20, 4 + m * 3));
}

function addSismoMarker(s) {
  const color = magColor(s.magnitud);
  const radius = magRadius(s.magnitud);
  const marker = L.circleMarker([s.lat, s.lng], {
    radius,
    fillColor: color,
    color: color,
    weight: 1,
    opacity: 1,
    fillOpacity: 0.6,
  });
  const horaUtc = new Date(s.hora_utc);
  const horaStr = new Intl.DateTimeFormat('es-SV', {
    timeZone: 'America/El_Salvador',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).format(horaUtc) + ' SV';
  marker.bindPopup(`
    <strong>M${Number(s.magnitud).toFixed(1)}</strong><br>
    Profundidad: ${s.profundidad_km} km<br>
    Hora: ${horaStr}<br>
    Severidad: ${s.severidad || 'N/A'}<br>
    Fuente: ${s.fuente || 'N/A'}
  `);
  marker.addTo(sismoLayer);
  return marker;
}

function addVolcanMarker(v) {
  const color = (v.nivel_alerta_actual === 'NORMAL' || !v.nivel_alerta_actual) ? '#00ff8c' : '#ffaa00';
  const triangle = L.divIcon({
    html: `<div style="
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 20px solid ${color};
      filter: drop-shadow(0 0 6px ${color});
    "></div>`,
    className: 'volcan-marker',
    iconSize: [24, 24],
    iconAnchor: [12, 20],
  });
  if (v.lat && v.lng) {
    const marker = L.marker([v.lat, v.lng], { icon: triangle });
    marker.bindPopup(`
      <strong>${v.nombre}</strong><br>
      Estado: ${v.estado_actividad || 'N/A'}<br>
      Alerta: ${v.nivel_alerta_actual || 'NORMAL'}<br>
      ${v.forecast_mensaje ? '<br>' + v.forecast_mensaje : ''}
    `);
    marker.addTo(volcanLayer);
  }
}

// ===== Fetch datos =====
async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  try {
    // Pedimos sismos
    const resSismos = await fetch(FETCH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: 'lista todos los sismos detalladamente últimas 24 horas con coordenadas',
        origen_canal: 'web_move',
        origen_persona_id: 'AKS-JOSE'
      })
    });
    const dataSismos = await resSismos.json();
    
    // Pedimos volcanes
    const resVol = await fetch(FETCH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: 'estado de los volcanes monitoreados',
        origen_canal: 'web_move',
        origen_persona_id: 'AKS-JOSE'
      })
    });
    const dataVol = await resVol.json();

    renderData(dataSismos, dataVol);
  } catch (e) {
    console.error('[MOVE] Error:', e);
    document.getElementById('event-list').innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  } finally {
    document.getElementById('loading').classList.add('hidden');
  }
}

function renderData(sismosResp, volResp) {
  // Limpiar layers
  sismoLayer.clearLayers();
  volcanLayer.clearLayers();

  // Sismos · datos vienen en respuesta_pantalla.datos · pero también en raw via metadata
  // Como el LLM resume · necesitamos que devuelva detalles · alternativa: pegar a Supabase directo
  // Solo para testing inicial · usamos respuesta_pantalla.datos
  const sismosData = sismosResp?.respuesta_pantalla?.datos || {};
  const total = sismosData.total ?? 0;
  const maxMag = sismosData.max_magnitud ?? '—';
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-max').textContent = typeof maxMag === 'number' ? maxMag.toFixed(1) : maxMag;
  document.getElementById('event-count').textContent = total;

  // Si hay evento_mas_reciente · marcarlo
  if (sismosData.evento_mas_reciente) {
    const e = sismosData.evento_mas_reciente;
    addSismoMarker(e);
    map.setView([e.lat, e.lng], 8);
  }

  // Listar eventos sidebar
  const list = document.getElementById('event-list');
  if (sismosData.evento_mas_reciente) {
    const e = sismosData.evento_mas_reciente;
    const horaUtc = new Date(e.hora_utc);
    const horaStr = new Intl.DateTimeFormat('es-SV', {
      timeZone: 'America/El_Salvador',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).format(horaUtc);
    const m = Number(e.magnitud);
    const cls = m >= 4 ? 'high' : (m >= 3 ? 'med' : 'low');
    list.innerHTML = `
      <div class="event-row">
        <div class="event-meta">
          <span>${horaStr} SV</span>
          <span>${e.fuente || 'N/A'}</span>
        </div>
        <div class="event-mag ${cls}">M${m.toFixed(1)}</div>
        <div class="event-loc">Lat ${e.lat?.toFixed(2)} · Lng ${e.lng?.toFixed(2)} · ${e.profundidad_km} km</div>
      </div>
      <div class="empty-state" style="margin-top:10px;">
        ${total > 1 ? `Y ${total - 1} más · Jarvis tiene los detalles` : 'Único evento detectado'}
      </div>
    `;
  } else {
    list.innerHTML = '<div class="empty-state">Sin eventos en 24h</div>';
  }

  // Volcanes (si vienen en respuesta_pantalla.datos.volcanes_estado)
  const volList = document.getElementById('volcan-list');
  const volcanos = volResp?.respuesta_pantalla?.datos?.volcanes || [
    { nombre: 'Chaparrastique', alerta: 'NORMAL' },
    { nombre: 'Santa Ana (Ilamatepec)', alerta: 'NORMAL' },
    { nombre: 'San Vicente', alerta: 'NORMAL' },
    { nombre: 'San Miguel', alerta: 'NORMAL' },
  ];
  volList.innerHTML = volcanos.map(v => {
    const alerta = v.alerta || v.nivel_alerta_actual || 'NORMAL';
    const cls = (alerta !== 'NORMAL') ? 'alert-yellow' : '';
    return `
      <div class="volcan-row ${cls}">
        <span class="name">${v.nombre || v.name}</span>
        <span class="alert">${alerta}</span>
      </div>
    `;
  }).join('');
}


// Auto-refresh cada 60 seg
setInterval(loadData, 60000);

// Initial load
loadData();
</script>

</body>
</html>
